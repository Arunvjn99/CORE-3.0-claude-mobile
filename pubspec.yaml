name: participant_portal_mobile
description: Participant Portal — Mobile App (iOS & Android) by Congruent Solutions
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.8.1

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Supabase backend
  supabase_flutter: ^2.9.0

  # Secure storage (tokens)
  flutter_secure_storage: ^9.2.4

  # Charts
  fl_chart: ^0.70.2

  # Fonts
  google_fonts: ^6.2.1

  # Persistent local storage
  shared_preferences: ^2.3.5

  # i18n
  intl: ^0.20.2

  # Animations
  lottie: ^3.3.1

  # SVG
  flutter_svg: ^2.0.10+1

  # Cached images
  cached_network_image: ^3.4.1

  # Utils
  url_launcher: ^6.3.1
  package_info_plus: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
